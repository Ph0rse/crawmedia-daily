# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
#  萌宠赛道 — 温馨治愈类 Prompt 模板
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

name: "萌宠温馨治愈"
description: "适用于萌宠日常、温馨互动、治愈系内容"

# 视觉风格指导
visual_style: "暖色调，自然光线，浅景深，柔和滤镜，家庭场景为主"

# BGM 情绪
bgm_mood: "轻快温馨，钢琴/吉他为主，节奏舒缓"

# 推荐运镜
camera_moves:
  - "慢推特写（捕捉宠物表情）"
  - "平视跟拍（展示日常互动）"
  - "俯拍（拍摄宠物睡姿/玩耍）"
  - "缓慢环绕（360度展示宠物）"

# 适用内容类型
content_types:
  - "宠物日常"
  - "宠物互动"
  - "宠物反应"
  - "治愈系"
  - "萌宠VLOG"

# 推荐时长
duration_range: [8, 12]

# 常用标签
default_tags:
  - "萌宠"
  - "治愈"
  - "日常"
  - "可爱"

# 示例 Prompt
example_prompt: |
  一只橘色小猫咪蜷缩在米白色沙发靠枕旁，阳光从窗帘缝隙洒入，
  在猫咪毛发上形成温暖的光斑。
  0-3秒：俯拍全景，猫咪缩成一团安静打盹，耳朵偶尔微微抽动。
  3-6秒：慢推至面部特写，猫咪缓缓睁开眼睛，翠绿色瞳孔聚焦镜头。
  6-9秒：猫咪伸了一个大大的懒腰，四肢完全伸展，嘴巴张大打哈欠。
  9-12秒：猫咪翻身露出肚皮，前爪揣在胸前，满足地眯起眼睛。
  音效：轻柔的钢琴BGM，猫咪呼噜声若隐若现，阳光洒落的温暖氛围。
  风格：暖色调，电影级质感，浅景深，柔和自然光。

# 结构模板（分时段）
structure_template:
  - time: "0-3s"
    role: "铺垫/建立场景"
    tips: "展示环境，建立温馨氛围"
  - time: "3-6s"
    role: "主角登场/互动"
    tips: "特写宠物表情或动作"
  - time: "6-9s"
    role: "高潮/反应"
    tips: "最萌/最有趣的瞬间"
  - time: "9-12s"
    role: "收尾/余韵"
    tips: "温馨结尾，留有回味"
