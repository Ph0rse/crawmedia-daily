# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
#  萌宠赛道 — 搞笑反转类 Prompt 模板
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

name: "萌宠搞笑反转"
description: "适用于宠物搞笑、反差萌、沙雕日常、出乎意料的反转内容"

# 视觉风格指导
visual_style: "明亮饱和，快节奏剪辑感，适当慢放捕捉搞笑瞬间，表情包式特写"

# BGM 情绪
bgm_mood: "轻快俏皮，卡点音效（如'等等等等~'反转音效），喜剧配乐"

# 推荐运镜
camera_moves:
  - "平视固定镜头（监控视角，记录搞笑瞬间）"
  - "突然推镜（强调反转瞬间）"
  - "跟拍晃动（增加临场感）"
  - "慢镜头回放（搞笑动作慢放）"

# 适用内容类型
content_types:
  - "搞笑反转"
  - "反差萌"
  - "宠物沙雕"
  - "宠物社死"
  - "宠物翻车现场"

# 推荐时长
duration_range: [8, 15]

# 常用标签
default_tags:
  - "搞笑"
  - "反转"
  - "沙雕"
  - "萌宠"

# 示例 Prompt
example_prompt: |
  一只胖橘猫蹲在茶几边，眼神锁定桌上的烤鸡，表情严肃认真。
  0-3秒：固定镜头全景，猫咪专注盯着烤鸡，屁股微微抖动蓄力。
  3-5秒：猫咪奋力跳跃——但因为太胖，前爪刚搭上桌沿就滑了下来，
  慢镜头回放滑落瞬间，猫咪表情从自信变为惊恐。
  5-8秒：猫咪摔在地上，愣了一秒，假装什么都没发生，开始舔爪子。
  8-10秒：特写猫咪转头斜眼看镜头，配上"你看到了什么？"的字幕。
  音效：蓄力时紧张鼓点，滑落时喜剧音效（滑稽哨声），
  舔爪子时切换到优雅钢琴曲，形成反差。
  风格：明亮色调，高饱和，喜剧节奏，适当慢放。

# 结构模板（分时段）
structure_template:
  - time: "0-3s"
    role: "铺垫/蓄势"
    tips: "建立期待感，暗示接下来会发生什么"
  - time: "3-6s"
    role: "触发/意外"
    tips: "搞笑事件发生，出乎意料"
  - time: "6-9s"
    role: "反应/反转"
    tips: "宠物的搞笑反应，或情况反转"
  - time: "9-12s"
    role: "定格/回味"
    tips: "表情包式定格，或假装无事发生"
