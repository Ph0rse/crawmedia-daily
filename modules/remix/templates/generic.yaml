# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
#  通用 Prompt 模板
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

name: "通用短视频"
description: "适用于各类短视频内容的通用模板，无特定赛道限制"

# 视觉风格指导
visual_style: "电影级质感，根据内容自适应色调，注重构图和光影"

# BGM 情绪
bgm_mood: "根据内容情绪自适应，节奏与画面匹配"

# 推荐运镜
camera_moves:
  - "推镜头（靠近主体，建立焦点）"
  - "拉镜头（展示全貌，揭示环境）"
  - "跟随镜头（跟拍动态主体）"
  - "固定镜头（稳定画面，适合对话/反应类）"

# 适用内容类型
content_types:
  - "通用"

# 推荐时长
duration_range: [8, 15]

# 常用标签
default_tags: []

# 示例 Prompt
example_prompt: |
  画面中央是一位年轻人站在城市天台，背景是黄昏的城市天际线。
  0-3秒：远景建立镜头，展示天台全貌和城市背景，金色阳光洒落。
  3-7秒：慢推至中景，人物转身面向镜头，表情从沉思变为微笑。
  7-11秒：特写面部表情和细节，风吹动发丝，光影变化。
  11-15秒：拉远镜头，人物伸展双臂拥抱夕阳，定格在剪影画面。
  音效：城市环境音（远处车声、风声），配上温暖的吉他BGM。
  风格：电影级质感，2.35:1宽银幕，暖色调，浅景深。

# 结构模板（分时段）
structure_template:
  - time: "0-3s"
    role: "开场/建立"
    tips: "建立场景和氛围"
  - time: "3-7s"
    role: "发展/推进"
    tips: "推进内容，展示核心元素"
  - time: "7-11s"
    role: "高潮/核心"
    tips: "最重要的画面或转折点"
  - time: "11-15s"
    role: "收尾/定格"
    tips: "完美结尾，留下印象"
